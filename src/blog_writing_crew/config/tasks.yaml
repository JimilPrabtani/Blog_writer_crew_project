research_task:
  description: >
    Research {topic} thoroughly. Find key facts, recent trends, and interesting
    angles that would make a compelling blog post. Focus on providing accurate,
    up-to-date information, different perspectives, simple language (slow is
    smooth and smooth is fast).
  expected_output: >
    A structured research brief with 8-10 key points about {topic}, including
    relevant facts, statistics, trends, and unique angles that can be used to
    write an engaging blog post.
  agent: researcher

writing_task:
  description: >
    Using the research brief provided, write an engaging blog post about
    {topic}. The post should have a compelling introduction, 3-4 well-structured
    main sections, and a strong conclusion. Make it informative yet accessible
    to a general audience. Use the current date ({current_date}) and current
    year ({current_year}) for any time-sensitive references.
  expected_output: >
    A complete blog post in markdown format, approximately 800-1000 words, with
    an engaging title, introduction, 3-4 main sections with subheadings, and a
    conclusion. Ensure the content reflects the latest context for
    {current_year}.
  agent: writer

editing_task:
  description: >
    Review and polish the blog post for clarity, grammar, flow, engagement and
    simplicity.  Ensure the tone is consistent, the structure is logical,  and
    the content is compelling. Fix any errors and improve readability.
  expected_output: >
    A final, polished blog post in markdown format ready for publication. The
    post should be well-structured, error-free,persuasive and engaging.
  agent: editor
  output_file: blog_outputs/blog_post.md

social_media_task:
  description: >
      Create engaging short insightful social media posts to promote the blog
      post on twitter/X and linkedin and drive traffic to the website.
  expected_output: >
    A set of 3-5 social media posts in markdown format, each tailored for
    either Twitter/X or LinkedIn.  Each post should include a compelling hook,
    a brief summary of the blog post, and a call-to-action with a link to the
    blog post.  Ensure the content is optimized and well-structured for the
    respective platforms to maximize engagement and reach.
  agent: social_media_manager
  output_file: SM_outputs/social_media_posts.md


social_media_task_2:
  description: >
    Using the polished blog post from the previous task, create social media
    content for two platforms:

    1. A Twitter/X thread of 5-7 tweets that captures the key points
       of the blog post. The first tweet should hook the reader, and
       the thread should flow naturally from one tweet to the next.
    2. A LinkedIn post summary (2-3 paragraphs) that highlights the
       main takeaways in a professional tone.
  expected_output: >
    A markdown file with two sections: a Twitter/X thread (5-7 numbered
    tweets, each under 280 characters) and a LinkedIn post summary
    (2-3 paragraphs).
  agent: social_media_manager_2
  output_file: SM_outputs/social_media_posts_1.md
  